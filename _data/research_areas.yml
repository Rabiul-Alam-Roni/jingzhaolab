- name: "Food Protein Functionality"
  confirmed: true
  description: >
    Research into the functionality of food proteins — how proteins
    behave structurally and physically in food systems. (Source: SDSU
    faculty profile.)

- name: "Alternative & Plant-Based Proteins"
  confirmed: true
  description: >
    Development and characterization of novel proteins, including
    insect and algae proteins, and the use of plant and algae proteins
    in alternative meat products. (Source: SDSU faculty profile.)

- name: "Flavor Chemistry of Protein-Rich Foods"
  confirmed: true
  description: >
    Characterization and synthesis of flavor compounds in meat,
    seafood, and other protein-rich foods, and how flavor is impacted
    by protein source and processing. (Source: SDSU faculty profile.)

- name: "Algae-Based Ingredients"
  confirmed: true
  description: >
    Utilization of algae proteins, including stabilization of
    C-phycocyanin (a blue colorant derived from spirulina), and
    ongoing microalgae research with USDA support. (Source: SDSU
    profile and current lab roster.)

- name: "Fermentation & Brewing-Related Research"
  confirmed: false
  description: "To be confirmed."

- name: "Food Innovation & Sustainability"
