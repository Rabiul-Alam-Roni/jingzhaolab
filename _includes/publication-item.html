{% comment %}
  Usage: {% include publication-item.html pub=pub %}
{% endcomment %}
{% assign p = include.pub %}
<li class="pub-item">
  <span class="pub-item__year">{{ p.year }}</span>
  <span class="pub-item__body">
    {{ p.authors }} ({{ p.year }}). {{ p.title }}. <em>{{ p.journal }}</em>{% if p.details %}, {{ p.details }}{% endif %}.
    {% if p.doi %} <a href="https://doi.org/{{ p.doi }}" class="pub-item__doi">doi.org/{{ p.doi }}</a>{% endif %}
  </span>
</li>
