{% comment %}
  Hero decoration: combines a peptide/protein chain, a flavor-molecule
  ring, and an AI-style node network into one motif. Purely decorative,
  no text — used in the homepage hero band.
{% endcomment %}
<svg viewBox="0 0 640 360" class="hero-motif" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- AI network layer (back) -->
  <g opacity="0.28" stroke="currentColor" stroke-width="1.5">
    <path d="M40 60 L150 110 M150 110 L260 50 M150 110 L230 190 M260 50 L380 90 M230 190 L380 90 M380 90 L500 60 M380 90 L470 200 M500 60 L600 130 M470 200 L600 130"/>
  </g>
  <g opacity="0.5" fill="currentColor">
    <circle cx="40" cy="60" r="4"/>
    <circle cx="150" cy="110" r="5"/>
    <circle cx="260" cy="50" r="4"/>
    <circle cx="230" cy="190" r="4"/>
    <circle cx="380" cy="90" r="6"/>
    <circle cx="500" cy="60" r="4"/>
    <circle cx="470" cy="200" r="4"/>
    <circle cx="600" cy="130" r="5"/>
  </g>

  <!-- Peptide / protein chain (mid) -->
  <path d="M60 260 L140 220 L210 270 L290 225 L360 275 L440 230 L520 270 L590 235"
        stroke="currentColor" stroke-width="2.5" opacity="0.55"/>
  <g fill="currentColor" opacity="0.9">
    <circle cx="60" cy="260" r="7"/>
    <circle cx="140" cy="220" r="9"/>
    <circle cx="210" cy="270" r="7"/>
    <circle cx="290" cy="225" r="10"/>
    <circle cx="360" cy="275" r="7"/>
    <circle cx="440" cy="230" r="9"/>
    <circle cx="520" cy="270" r="7"/>
    <circle cx="590" cy="235" r="8"/>
  </g>

  <!-- Flavor-molecule rings (front accents) -->
  <g stroke="currentColor" stroke-width="2" opacity="0.7" fill="none">
    <polygon points="500,170 525,184 525,212 500,226 475,212 475,184"/>
    <polygon points="110,150 130,162 130,186 110,198 90,186 90,162"/>
  </g>
</svg>
